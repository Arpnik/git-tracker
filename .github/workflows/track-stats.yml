name: Track Dev Stats

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch: {}    # allows manual "Run workflow" trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests pyyaml

      - name: Collect stats
        env:
          STATS_PAT: ${{ secrets.STATS_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          DAYS_LOOKBACK: '490'
          # INCLUDE_ORGS: 'my-org,another-org'
          # EXCLUDE_REPOS: 'someone/huge-repo'
        run: python scripts/collect_stats.py

      - name: Commit results
        run: |
          git config user.name "dev-stats-bot"
          git config user.email "dev-stats-bot@users.noreply.github.com"
          git add data/ README_STATS.md
          git diff --staged --quiet || git commit -m "chore: update dev stats [skip ci]"
          git push