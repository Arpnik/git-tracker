<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>dev-stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --panel:#11161d; --line:#1f2630; --text:#c9d1d9; --dim:#6e7681;
    --accent:#3fb950; --accent2:#58a6ff; --warn:#e3b341; --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px}
  header{padding:28px 32px 16px;border-bottom:1px solid var(--line)}
  header .prompt{color:var(--accent);}
  h1{margin:4px 0 0;font-size:22px;font-weight:600;letter-spacing:-.5px}
  .sub{color:var(--dim);margin-top:6px}
  main{padding:24px 32px;display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:18px}
  .card h2{margin:0 0 14px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:600}
  .totals{display:flex;gap:28px;flex-wrap:wrap}
  .stat{}
  .stat .n{font-size:28px;font-weight:700}
  .stat .l{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .add{color:var(--accent)} .del{color:#f85149}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td,th{padding:6px 4px;text-align:left;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-weight:500;text-transform:uppercase;font-size:11px}
  .bar-wrap{width:100%;height:6px;background:#1f2630;border-radius:3px;overflow:hidden;margin-top:4px}
  .bar{height:100%;background:var(--accent2)}
  .full{grid-column:1/-1}
  #err{color:var(--warn);padding:0 32px}
  canvas{max-height:280px}
</style>
</head>
<body>
<header>
  <div class="prompt">$ dev-stats --generated</div>
  <h1 id="ts">loading...</h1>
  <div class="sub">lines changed across every repo you have write access to</div>
</header>
<div id="err"></div>
<main id="app"></main>

<script>
async function load() {
  const res = await fetch('../data/stats.json');
  if (!res.ok) {
    document.getElementById('err').textContent = 'Could not load data/stats.json — run the workflow at least once first.';
    return;
  }
  const stats = await res.json();
  document.getElementById('ts').textContent = `updated ${new Date(stats.generated_at).toLocaleString()}`;

  const app = document.getElementById('app');

  // Totals
  const totalsCard = document.createElement('div');
  totalsCard.className = 'card full';
  totalsCard.innerHTML = `
    <h2>totals</h2>
    <div class="totals">
      <div class="stat"><div class="n">${stats.totals.commits}</div><div class="l">commits</div></div>
      <div class="stat"><div class="n add">+${stats.totals.additions.toLocaleString()}</div><div class="l">lines added</div></div>
      <div class="stat"><div class="n del">-${stats.totals.deletions.toLocaleString()}</div><div class="l">lines removed</div></div>
    </div>`;
  app.appendChild(totalsCard);

  // Category chart
  const catCard = document.createElement('div');
  catCard.className = 'card';
  catCard.innerHTML = '<h2>by category</h2><canvas id="catChart"></canvas>';
  app.appendChild(catCard);

  // Language chart
  const langCard = document.createElement('div');
  langCard.className = 'card';
  langCard.innerHTML = '<h2>by language</h2><canvas id="langChart"></canvas>';
  app.appendChild(langCard);

  // Weekly trend
  const weekCard = document.createElement('div');
  weekCard.className = 'card full';
  weekCard.innerHTML = '<h2>weekly trend</h2><canvas id="weekChart"></canvas>';
  app.appendChild(weekCard);

  // Repo table
  const repoCard = document.createElement('div');
  repoCard.className = 'card full';
  const repoRows = Object.entries(stats.by_repo)
    .sort((a,b) => b[1].additions - a[1].additions)
    .map(([repo, s]) => `<tr><td>${repo}</td><td>${s.commits}</td><td class="add">+${s.additions}</td><td class="del">-${s.deletions}</td></tr>`)
    .join('');
  repoCard.innerHTML = `<h2>by repository</h2><table><tr><th>repo</th><th>commits</th><th>added</th><th>removed</th></tr>${repoRows}</table>`;
  app.appendChild(repoCard);

  const palette = ['#3fb950','#58a6ff','#e3b341','#f85149','#bc8cff','#39c5cf','#f778ba','#79c0ff'];

  new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: {
      labels: Object.keys(stats.by_category),
      datasets: [{ data: Object.values(stats.by_category).map(v => v.additions + v.deletions), backgroundColor: palette }]
    },
    options: { plugins: { legend: { labels: { color: '#c9d1d9' } } } }
  });

  const langs = Object.entries(stats.by_language).sort((a,b) => (b[1].additions+b[1].deletions) - (a[1].additions+a[1].deletions)).slice(0,10);
  new Chart(document.getElementById('langChart'), {
    type: 'bar',
    data: {
      labels: langs.map(l => l[0]),
      datasets: [{ label: 'lines changed', data: langs.map(l => l[1].additions + l[1].deletions), backgroundColor: '#58a6ff' }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#6e7681' }, grid: { color: '#1f2630' } }, y: { ticks: { color: '#c9d1d9' }, grid: { display: false } } }
    }
  });

  const weeks = Object.entries(stats.by_week).sort((a,b) => a[0].localeCompare(b[0]));
  new Chart(document.getElementById('weekChart'), {
    type: 'line',
    data: {
      labels: weeks.map(w => w[0]),
      datasets: [
        { label: 'additions', data: weeks.map(w => w[1].additions), borderColor: '#3fb950', tension: .3 },
        { label: 'deletions', data: weeks.map(w => -w[1].deletions), borderColor: '#f85149', tension: .3 },
      ]
    },
    options: {
      plugins: { legend: { labels: { color: '#c9d1d9' } } },
      scales: { x: { ticks: { color: '#6e7681' }, grid: { color: '#1f2630' } }, y: { ticks: { color: '#6e7681' }, grid: { color: '#1f2630' } } }
    }
  });
}
load();
</script>
</body>
</html>
